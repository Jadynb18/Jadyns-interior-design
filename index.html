<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Georgia', serif;
    background-color: #f5f3ef;
    color: #2f2f2f;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    align-items: center;
}

nav {
    display: flex;
    flex-wrap: wrap;
}

nav a {
    margin: 5px 10px;
    text-decoration: none;
    color: #444;
    font-size: 14px;
}

.btn {
    background-color: #556b4f;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 14px;
}

/* HERO */
.hero {
    display: flex;
    padding: 60px;
    align-items: center;
    gap: 40px;
}

.hero-text {
    flex: 1;
}

.hero-text h1 {
    font-size: 48px;
    line-height: 1.2;
}

.hero-text p {
    max-width: 400px;
    margin: 20px 0;
    color: #666;
}

.hero img {
    flex: 1;
    max-width: 100%;
    border-radius: 10px;
}

/* SECTION */
.section {
    display: flex;
    padding: 60px;
    gap: 40px;
}

.section img {
    width: 50%;
    border-radius: 10px;
}

.section-text {
    width: 50%;
}

.section-text h2 {
    font-size: 32px;
}

.features div {
    margin-bottom: 15px;
}

/* GALLERY */
.gallery {
    display: flex;
    gap: 20px;
    padding: 60px;
}

.gallery img {
    width: 50%;
    border-radius: 10px;
}

/* CTA */
.cta {
    background-color: #556b4f;
    color: white;
    text-align: center;
    padding: 50px;
}

/* FOOTER */
footer {
    display: flex;
    justify-content: space-between;
    padding: 40px 60px;
    background: #2f2f2f;
    color: white;
    flex-wrap: wrap;
    gap: 20px;
}

/* 🔥 MOBILE RESPONSIVE */
@media (max-width: 900px) {

    header {
        flex-direction: column;
        gap: 10px;
        padding: 20px;
    }

    .hero {
        flex-direction: column;
        padding: 30px;
        text-align: center;
    }

    .hero-text h1 {
        font-size: 32px;
    }

    .hero-text p {
        margin: 15px auto;
    }

    .section {
        flex-direction: column;
        padding: 30px;
    }

    .section img,
    .section-text {
        width: 100%;
    }

    .gallery {
        flex-direction: column;
        padding: 30px;
    }

    .gallery img {
        width: 100%;
    }

    footer {
        flex-direction: column;
        padding: 30px;
    }
}

/* 📱 EXTRA SMALL SCREENS */
@media (max-width: 500px) {

    .hero-text h1 {
        font-size: 26px;
    }

    nav {
        justify-content: center;
    }

    .btn {
        padding: 8px 16px;
        font-size: 12px;
    }
}
</style>
